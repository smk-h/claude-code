.npc: &npc
  - services:
      - docker
    stages:
      - name: run with npc
        image: ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}:latest
Claude:
  issue.comment@npc: *npc
  pull_request.comment@npc: *npc

$:
  vscode:
    - docker:
        image: docker.cnb.cool/looc/default-dev-env:latest
      services:
        - vscode
        - docker
  tag_push:
    - services:
        - docker
      docker:
        volumes:
          - /data/codewiki/${CNB_REPO_SLUG}:data
      stages:
        - name: generate codewiki
          timeout: 10h
          image: cnbcool/codewiki:latest
          settings:
            use_codebuddy: 0
            git_doc_dir: /data/codewiki/${CNB_REPO_SLUG}
        - name: 获取 codewiki
          image: docker.cnb.cool/looc/git-cnb
          script: |
            mv /data/codewiki/${CNB_REPO_SLUG}/* .
            find /workspace -name "*.md"
            git-cnb knowledges clean
        - name: build knowledge base
          image: cnbcool/knowledge-base
          settings:
            embedding_model: hunyuan
            include: "**/**.md"
            exclude: ""

dev:
  push:
    - services:
        - name: docker
          options:
            rootlessBuildkitd:
              enabled: true
      stages:
        - name: docker build & push
          script: |
            docker buildx build --platform linux/amd64,linux/arm64 -t ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}:latest --push .
